name: ci-api

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-api.yml"
      - "apps/api/**"
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
      - "chore/**"
      - "hotfix/**"
    paths:
      - ".github/workflows/ci-api.yml"
      - "apps/api/**"

permissions:
  contents: read

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: test-api
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Thiet lap Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Chay kiem thu backend
        working-directory: apps/api
        run: mvn -B test

  build-api:
    name: build-api
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Thiet lap Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Bien dich backend
        working-directory: apps/api
        run: mvn -B -DskipTests package
