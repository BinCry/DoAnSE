name: ci-web

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-web.yml"
      - "apps/web/**"
      - "packages/shared-types/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
      - "chore/**"
      - "hotfix/**"
    paths:
      - ".github/workflows/ci-web.yml"
      - "apps/web/**"
      - "packages/shared-types/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Thiet lap Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cai dependency
        run: npm ci

      - name: Chay kiem thu don vi
        working-directory: apps/web
        run: npm exec vitest -- --configLoader runner --run

  build-web:
    name: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Thiet lap Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cai dependency
        run: npm ci

      - name: Bien dich ung dung web
        working-directory: apps/web
        run: npm run build
