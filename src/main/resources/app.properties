# NOTE: Sửa thông tin DB tại đây nếu đổi VPS / tài khoản.
# Ví dụ: jdbc:postgresql://<HOST>:5432/airline

db.url=jdbc:postgresql://localhost:5432/airline
# NOTE: Sửa user/pass tại đây hoặc dùng biến môi trường DB_USER/DB_PASSWORD.
db.user=airline_app
db.password=CHANGE_ME_STRONG_PASSWORD

# NOTE: Đổi TTL (phút) nếu cần.
booking.ttl.minutes=15
# NOTE: Đổi chu kỳ chạy job TTL (giây) nếu cần.
booking.ttl.poll.seconds=30

# NOTE: Đổi giới hạn lockout nếu cần.
login.max.failures=5
login.lock.minutes=15

# NOTE: Đổi TTL OTP nếu cần.
otp.ttl.minutes=5
otp.max.attempts=5
otp.resend.cooldown.seconds=60

# NOTE: Đổi theme mặc định LIGHT/DARK nếu cần.
theme=LIGHT
